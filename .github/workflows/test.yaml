name: JS - Unit Tests

on: push

jobs:
  run-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn --frozen-lockfile

      - name: Check types
        run: |
          yarn run typecheck

      - name: Run unit tests
        run: |
          yarn run test

      - name: Run integrated tests
        uses: ./
        with:
          should_push: false
          artifact_name: "diagram.svg"
